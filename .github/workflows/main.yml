name: Build CakeAuto Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable and install wrapper
        run: |
          chmod +x gradlew
          java -cp gradle/wrapper/gradle-wrapper.jar \
            org.gradle.wrapper.GradleWrapperMain wrapper \
            --gradle-version 8.8 2>/dev/null || \
          gradle wrapper --gradle-version 8.8 2>/dev/null || \
          curl -L https://services.gradle.org/distributions/gradle-8.8-bin.zip \
            -o /tmp/gradle.zip && \
          unzip -q /tmp/gradle.zip -d /tmp/ && \
          export PATH="/tmp/gradle-8.8/bin:$PATH" && \
          gradle wrapper

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cakeauto-mod
          path: build/libs/cakeauto-*.jar
          if-no-files-found: error
